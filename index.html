          const [configs, setConfigs] = useState([]);
          const [outputFormat, setOutputFormat] = useState('full');
          const [generatedText, setGeneratedText] = useState('');
          const [copied, setCopied] = useState(false);
          const textRef = useRef(null);

          const toggleNode = (nodeId) => {
            setExpandedNodes(prev => ({
              ...prev,
              [nodeId]: !prev[nodeId]
            }));
          };

          const addConfig = (lesson) => {
            setConfigs([...configs, {
              id: Date.now() + Math.random(),
              lesson: lesson,
              type: 'trac_nghiem',
              level: 'Nhận biết',
              count: 1
            }]);
          };

          const updateConfig = (id, field, value) => {
            setConfigs(configs.map(c => c.id === id ? { ...c, [field]: value } : c));
          };

          const removeConfig = (id) => {
            setConfigs(configs.filter(c => c.id !== id));
          };

          const getConfigCount = (lessonCode) => {
            return configs.filter(c => c.lesson.code === lessonCode).length;
          };

          const currentData = activeGrade === '10' ? dataTo10 : activeGrade === '11' ? dataTo11 : dataTo12;

          const generateTemplate = () => {
            if (configs.length === 0) return;

            let text = '';

            if (outputFormat === 'summary') {
              text += `--- TÓM TẮT CẤU TRÚC (MA TRẬN) ---\n\n`;
              configs.forEach((config, index) => {
                let typeName = '';
                if (config.type === 'trac_nghiem') typeName = 'Trắc nghiệm';
                if (config.type === 'dung_sai') typeName = 'Đúng/Sai';
                if (config.type === 'tra_loi_ngan') typeName = 'Trả lời ngắn';

                text += `${index + 1}. Tên bài: ${config.lesson.name} | Loại: ${typeName} | Số câu: ${config.count} | Mức độ: ${config.level}\n`;
              });
              setGeneratedText(text);
              setCopied(false);
              return;
            }

            let globalQuestionIndex = 1;

            configs.forEach((config) => {
              let modifiedCode = config.lesson.code;
              if (config.type === 'trac_nghiem') {
                modifiedCode = modifiedCode.replace(/S(\d{2})\]/, 'D$1]');
              } else if (config.type === 'dung_sai') {
                modifiedCode = modifiedCode.replace(/S(\d{2})\]/, 'F$1]');
              }

              let typeName = '';
              if (config.type === 'trac_nghiem') typeName = 'Trắc nghiệm';
              if (config.type === 'dung_sai') typeName = 'Đúng/Sai';
              if (config.type === 'tra_loi_ngan') typeName = 'Trả lời ngắn';

              text += `--- TÊN BÀI: ${config.lesson.name.toUpperCase()} ---\n`;
              text += `Loại: ${typeName} | Mức độ: ${config.level} | Số câu: ${config.count}\n\n`;

              for (let i = 1; i <= config.count; i++) {
                if (config.type === 'trac_nghiem') {
                  text += `Câu ${globalQuestionIndex}: ${modifiedCode} [${config.level}] (Nhập nội dung câu hỏi trắc nghiệm vào đây...)\n`;
                  text += `A. Lựa chọn A\nB. Lựa chọn B\nC. Lựa chọn C\nD. Lựa chọn D\n`;
                  text += `Đáp án: ...\n\n`;
                } 
                else if (config.type === 'dung_sai') {
                  text += `Câu ${globalQuestionIndex}: ${modifiedCode} [${config.level}] (Nhập nội dung câu hỏi đúng/sai vào đây...)\n`;
                  text += `a) Mệnh đề 1\nb) Mệnh đề 2\nc) Mệnh đề 3\nd) Mệnh đề 4\n`;
                  text += `Đáp án (Đ/S): a[ ] b[ ] c[ ] d[ ]\n\n`;
                } 
                else if (config.type === 'tra_loi_ngan') {
                  text += `Câu ${globalQuestionIndex}: ${modifiedCode} [${config.level}] (Nhập nội dung câu hỏi trả lời ngắn vào đây...)\n`;
                  text += `Trả lời: ........................................................................\n\n`;
                }
                globalQuestionIndex++;
              }
            });

            setGeneratedText(text);
            setCopied(false);
          };

          const handleCopy = () => {
            if (navigator.clipboard && navigator.clipboard.writeText) {
              navigator.clipboard.writeText(generatedText).then(() => {
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);

                setCopied(true);
                setTimeout(() => setCopied(false), 2000);

                    <button
                      onClick={() => setActiveGrade('10')}
                      className={`flex-1 flex justify-center items-center gap-2 py-1.5 text-sm font-semibold rounded-md transition-colors ${activeGrade === '10' ? 'bg-white text-blue-700 shadow' : 'text-blue-100 hover:text-white hover:bg-blue-700/50'}`}
                    >
                      <BookOpen size={16} />
                      Toán 10
                    </button>
                    <button
                      onClick={() => setActiveGrade('11')}
                      className={`flex-1 flex justify-center items-center gap-2 py-1.5 text-sm font-semibold rounded-md transition-colors ${activeGrade === '11' ? 'bg-white text-blue-700 shadow' : 'text-blue-100 hover:text-white hover:bg-blue-700/50'}`}
                    >
                      <BookOpen size={16} />
                      Toán 11
                    </button>
                    <button
                      onClick={() => setActiveGrade('12')}
                      className={`flex-1 flex justify-center items-center gap-2 py-1.5 text-sm font-semibold rounded-md transition-colors ${activeGrade === '12' ? 'bg-white text-blue-700 shadow' : 'text-blue-100 hover:text-white hover:bg-blue-700/50'}`}
                    >
                      <BookOpen size={16} />
                      Toán 12
                    </button>
                  </div>
                </div>

                <div className="p-3 flex-grow overflow-y-auto">
                  {currentData.map((chapter) => (
                    <div key={chapter.id} className="mb-2">
                      <div 
                        className="flex items-center cursor-pointer p-2 hover:bg-gray-100 rounded text-gray-800 font-semibold"
                        onClick={() => toggleNode(chapter.id)}
                      >
                        {expandedNodes[chapter.id] ? <ChevronDown size={18} className="text-gray-500 mr-1"/> : <ChevronRight size={18} className="text-gray-500 mr-1"/>}
                        <Folder size={18} className="text-blue-500 mr-2" />
                        <span className="text-sm">[{chapter.id}] {chapter.title}</span>
                      </div>

                      {expandedNodes[chapter.id] && (
                        <div className="ml-6 border-l border-gray-200 pl-2 mt-1">
                          {chapter.topics.map((topic, tIndex) => {
                            const topicId = `${chapter.id}-t${tIndex}`;
                            return (
                              <div key={topicId} className="mb-1">
                                <div 
                                  className="flex items-center cursor-pointer p-1.5 hover:bg-gray-100 rounded text-gray-700 font-medium"
                                  onClick={() => toggleNode(topicId)}
                                >
                                  {expandedNodes[topicId] ? <ChevronDown size={16} className="text-gray-400 mr-1"/> : <ChevronRight size={16} className="text-gray-400 mr-1"/>}
                                  <Folder size={16} className="text-yellow-500 mr-2" />
                                  <span className="text-sm">{topic.title}</span>
                                </div>

                                {expandedNodes[topicId] && (
                                  <div className="ml-6 mt-1 space-y-1">
                                    {topic.lessons.map((lesson) => {
                                      const count = getConfigCount(lesson.code);
                                      return (
                                        <div 
                                          key={lesson.code}
                                          onClick={() => addConfig(lesson)}
                                          className={`flex items-center cursor-pointer p-1.5 rounded text-sm group transition-colors ${count > 0 ? 'bg-blue-50 text-blue-800 font-medium' : 'hover:bg-gray-100 text-gray-600'}`}
                                        >
                                          <FileText size={14} className={`mr-2 flex-shrink-0 ${count > 0 ? 'text-blue-600' : 'text-gray-400'}`} />
                                          <span className="flex-grow flex items-center pr-2">
                                            <span className="text-xs bg-gray-200 text-gray-600 px-1 rounded mr-1 flex-shrink-0">{lesson.code}</span>
                                            <span className="line-clamp-2">{lesson.name}</span>
                                          </span>
                                          {count > 0 ? (
                                            <span className="ml-auto flex-shrink-0 bg-blue-500 text-white text-xs font-bold rounded-full h-5 w-5 flex items-center justify-center">
                                              {count}
                                            </span>
                                          ) : (
                                            <PlusCircle size={16} className="ml-auto text-gray-300 opacity-0 group-hover:opacity-100 transition-opacity" />
                                          )}
                                        </div>
                                      );
                                    })}
                                  </div>
                                )}
                              </div>
                            )
                          })}
                        </div>
                      )}
                    </div>
                  ))}
                </div>

                {/* KHU VỰC LIÊN KẾT TIỆN ÍCH */}
                <div className="p-4 bg-gray-50 border-t border-gray-200 flex-shrink-0 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                  <h3 className="text-sm font-bold text-gray-700 mb-2.5 flex items-center gap-1.5">
                    <ExternalLink size={16} className="text-blue-600" />
                    Liên kết tiện ích
                  </h3>
                  <ul className="space-y-2">
                    <li><a href="https://baigiangthaytienluc.vercel.app/" target="_blank" rel="noreferrer" className="text-xs font-medium text-blue-600 hover:text-blue-800 hover:underline flex items-center gap-1.5 transition-colors"><ChevronRight size={12} className="text-gray-400"/> Bài giảng thầy Tiến Lực</a></li>
                    <li><a href="https://vongquaytoanhoc.vercel.app/" target="_blank" rel="noreferrer" className="text-xs font-medium text-blue-600 hover:text-blue-800 hover:underline flex items-center gap-1.5 transition-colors"><ChevronRight size={12} className="text-gray-400"/> Vòng quay Toán học</a></li>
                    <li><a href="https://pptonline-self.vercel.app/" target="_blank" rel="noreferrer" className="text-xs font-medium text-blue-600 hover:text-blue-800 hover:underline flex items-center gap-1.5 transition-colors"><ChevronRight size={12} className="text-gray-400"/> PPT Online</a></li>
                    <li><a href="https://k12onlineppt2026.vercel.app/" target="_blank" rel="noreferrer" className="text-xs font-medium text-blue-600 hover:text-blue-800 hover:underline flex items-center gap-1.5 transition-colors"><ChevronRight size={12} className="text-gray-400"/> K12 Online PPT 2026</a></li>
                    <li><a href="https://lichbaogiang-ten.vercel.app/" target="_blank" rel="noreferrer" className="text-xs font-medium text-blue-600 hover:text-blue-800 hover:underline flex items-center gap-1.5 transition-colors"><ChevronRight size={12} className="text-gray-400"/> Lịch báo giảng</a></li>
                    <li><a href="https://mathgamev1.vercel.app/" target="_blank" rel="noreferrer" className="text-xs font-medium text-blue-600 hover:text-blue-800 hover:underline flex items-center gap-1.5 transition-colors"><ChevronRight size={12} className="text-gray-400"/> Math Game v1</a></li>
                    <li><a href="https://khongcogitucodaucon.vercel.app/" target="_blank" rel="noreferrer" className="text-xs font-medium text-blue-600 hover:text-blue-800 hover:underline flex items-center gap-1.5 transition-colors"><ChevronRight size={12} className="text-gray-400"/> Không có gì từ có đâu con</a></li>
                  </ul>
                </div>
              </div>

              {/* CỘT PHẢI: KHU VỰC CÀI ĐẶT VÀ TẠO VĂN BẢN */}
              <div className="w-full md:w-2/3 p-6 h-full overflow-y-auto flex flex-col bg-gray-100">
                <div className="flex flex-col h-full max-w-4xl mx-auto w-full">
                  
                  {/* Box Cài đặt (Các bài học đã chọn) */}
                  <div className="bg-white p-5 rounded-lg shadow-sm border border-gray-200 mb-4 flex-shrink-0">
                    <div className="flex justify-between items-center mb-4 border-b pb-2">
                      <h2 className="text-lg font-bold text-gray-800 flex items-center gap-2">
                        <Settings size={20} className="text-blue-600"/>
                        Cấu hình câu hỏi
                      </h2>
                      {configs.length > 0 && (
                        <button
                          onClick={() => setConfigs([])}
                          className="bg-red-50 text-red-600 hover:bg-red-100 text-xs font-semibold px-3 py-1 rounded transition-colors"
                        >
                          Xoá tất cả
                        </button>
                      )}
                    </div>

                    {configs.length === 0 ? (
                       <div className="text-center py-8 text-gray-400">
                         <Layout size={48} className="mx-auto mb-3 opacity-50" />
                         <p className="text-sm font-medium">Chưa có bài học nào được chọn.</p>
                         <p className="text-xs mt-1">Vui lòng bấm vào danh sách bên trái để thêm bài học vào cấu hình.</p>
                       </div>
                    ) : (
                      <div className="space-y-3 max-h-[40vh] overflow-y-auto pr-2 pb-2">
                        {configs.map((config, index) => (
                          <div key={config.id} className="bg-gray-50 border border-gray-200 p-3 rounded flex flex-col gap-3 relative hover:border-blue-300 transition-colors shadow-sm">
                            {/* Header: Tên bài & Code */}
                            <div className="flex items-start justify-between pr-8">
                              <div className="text-sm font-bold text-gray-800">
                                <span className="text-blue-600 mr-2">{config.lesson.code}</span>
                                {config.lesson.name}
                              </div>
                              <button 
                                onClick={() => removeConfig(config.id)}
                                className="absolute top-3 right-3 text-red-400 hover:text-red-600 bg-red-50 hover:bg-red-100 p-1.5 rounded transition-colors"
                                title="Xoá cấu hình này"
                              >
                                <Trash2 size={16} />
                              </button>
                            </div>

                            {/* Controls: Loại, Mức độ, Số lượng */}
                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
                              <div>
                                <label className="block text-xs font-semibold text-gray-500 mb-1">Loại câu hỏi:</label>
                                <select 
                                  value={config.type} 
                                  onChange={(e) => updateConfig(config.id, 'type', e.target.value)}
                                  className="w-full border border-gray-300 rounded p-1.5 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                                >
                                  <option value="trac_nghiem">Trắc nghiệm 4 lựa chọn</option>
                                  <option value="dung_sai">Trắc nghiệm Đúng/Sai</option>
                                  <option value="tra_loi_ngan">Trả lời ngắn</option>
                                </select>
                              </div>

                              <div>
                                <label className="block text-xs font-semibold text-gray-500 mb-1">Mức độ:</label>
                                <select 
                                  value={config.level} 
                                  onChange={(e) => updateConfig(config.id, 'level', e.target.value)}
                                  className="w-full border border-gray-300 rounded p-1.5 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                                >
                                  <option value="Nhận biết">Nhận biết</option>
                                  <option value="Thông hiểu">Thông hiểu</option>
                                  <option value="Vận dụng">Vận dụng</option>
                                  <option value="Vận dụng cao">Vận dụng cao</option>
                                </select>
                              </div>

                              <div>
                                <label className="block text-xs font-semibold text-gray-500 mb-1">Số câu:</label>
                                <input 
                                  type="number" 
                                  min="1" 
                                  max="50"
                                  value={config.count} 
                                  onChange={(e) => updateConfig(config.id, 'count', Number(e.target.value))}
                                  className="w-full border border-gray-300 rounded p-1.5 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                                />
                              </div>
                            </div>
                          </div>
                        ))}
                      </div>
                    )}

                    <div className="mt-4 border-t border-gray-200 pt-4">
                      <div className="flex flex-col sm:flex-row sm:items-center justify-between mb-4 gap-4">
                        <div>
                          <label className="block text-sm font-semibold text-gray-700 mb-2">Định dạng xuất văn bản:</label>
                          <div className="flex gap-4">
                            <label className="flex items-center gap-2 cursor-pointer bg-gray-50 px-3 py-1.5 rounded border border-gray-200 hover:bg-blue-50">
                              <input type="radio" value="full" checked={outputFormat === 'full'} onChange={(e) => setOutputFormat(e.target.value)} className="text-blue-600 focus:ring-blue-500 w-4 h-4" />
                              <span className="text-sm font-medium text-gray-700">Đề thi chi tiết</span>
                            </label>
                            <label className="flex items-center gap-2 cursor-pointer bg-gray-50 px-3 py-1.5 rounded border border-gray-200 hover:bg-blue-50">
                              <input type="radio" value="summary" checked={outputFormat === 'summary'} onChange={(e) => setOutputFormat(e.target.value)} className="text-blue-600 focus:ring-blue-500 w-4 h-4" />
                              <span className="text-sm font-medium text-gray-700">Tóm tắt (Ma trận)</span>
                            </label>
                          </div>
                        </div>
                        
                        {configs.length > 0 && (
                          <div className="text-right">
                            <div className="text-sm text-gray-500">Tổng số câu hỏi:</div>
                            <div className="text-2xl font-bold text-blue-600">{configs.reduce((acc, curr) => acc + curr.count, 0)}</div>
                          </div>
                        )}
                      </div>

                      <button 
                        onClick={generateTemplate}
                        disabled={configs.length === 0}
                        className={`w-full font-bold text-lg py-3 px-4 rounded-lg transition-colors shadow-sm ${configs.length > 0 ? 'bg-blue-600 hover:bg-blue-700 text-white' : 'bg-gray-300 text-gray-500 cursor-not-allowed'}`}
                      >
                        Sinh mẫu văn bản
                      </button>
                    </div>
                  </div>

                  {/* Box Kết quả sinh */}
                  {generatedText && (
                    <div className="bg-white flex flex-col flex-grow rounded-lg shadow-sm border border-gray-200 overflow-hidden mb-4">
                      <div className="bg-gray-50 p-3 border-b border-gray-200 flex justify-between items-center flex-shrink-0">
                        <span className="font-semibold text-gray-700 text-sm">Văn bản kết quả:</span>
                        <button 
                          onClick={handleCopy}
                          className={`flex items-center gap-1.5 text-sm px-3 py-1.5 rounded font-medium transition-colors ${copied ? 'bg-green-100 text-green-700 border border-green-200' : 'bg-white border border-gray-300 text-gray-700 hover:bg-gray-100'}`}
                        >
                          {copied ? <Check size={16} /> : <Copy size={16} />}
                          {copied ? 'Đã Copy!' : 'Copy nội dung'}
                        </button>
                      </div>
                      <textarea 
                        ref={textRef}
                        value={generatedText}
                        readOnly
                        className="w-full flex-grow p-4 text-gray-800 font-mono text-sm focus:outline-none resize-none min-h-[300px]"
                      />
                    </div>
                  )}
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
